<!DOCTYPE html>
<html>
<head>
    <style>
        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            height: 100vh;
        }

        .buttons {
            display: flex;
            justify-content: center;
            gap: 10px;
        }

        .matrix-container {
            margin-top: 20px;
        }

        table {
            border-collapse: collapse;
        }

        td {
            width: 40px;
            height: 40px;
            text-align: center;
            border: 1px solid black;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="buttons">
            <button onclick="setMatrix()">创建矩阵</button>
            <button onclick="resetMatrix()">矩阵置零</button>
        </div>

        <label for="rows">行数:</label>
        <input type="number" id="rows" min="0">
        <label for="cols">列数:</label>
        <input type="number" id="cols" min="0">

        <div class="matrix-container">
            <table id="matrix"></table>
        </div>
    </div>

    <script>
        function setMatrix() {
            var rows = parseInt(document.getElementById("rows").value);
            var cols = parseInt(document.getElementById("cols").value);

            var matrix = [];
            for (var i = 0; i < rows; i++) {
                var row = [];

                for (var j = 0; j < cols; j++) {
                    var value = parseInt(prompt("请输入矩阵[" + i + "][" + j + "]的数字"));

                    if (isNaN(value)) {
                        alert("无效输入！请输入数字！");
                        return;
                    }

                    row.push(value);
                }

                matrix.push(row);
            }

            renderMatrix(matrix);
        }

        function renderMatrix(matrix) {
            var table = document.getElementById("matrix");
            table.innerHTML = "";

            for (var i = 0; i < matrix.length; i++) {
                var row = matrix[i];

                var tr = document.createElement("tr");
                for (var j = 0; j < row.length; j++) {
                    var td = document.createElement("td");
                    td.innerHTML = row[j];
                    tr.appendChild(td);
                }

                table.appendChild(tr);
            }
        }

        function resetMatrix() {
            var table = document.getElementById("matrix");
            var rows = table.rows;

            var zeroIndices = [];
            for (var i = 0; i < rows.length; i++) {
                var cells = rows[i].cells;

                for (var j = 0; j < cells.length; j++) {
                    var cell = cells[j];
                    if (cell.innerHTML == "0") {
                        zeroIndices.push([i, j]);
                    }
                }
            }

            for (var i = 0; i < zeroIndices.length; i++) {
                var row = zeroIndices[i][0];
                var col = zeroIndices[i][1];

                for (var j = 0; j < rows.length; j++) {
                    rows[j].cells[col].innerHTML = "0";
                }

                var cells = rows[row].cells;
                for (var j = 0; j < cells.length; j++) {
                    cells[j].innerHTML = "0";
                }
            }
        }
    </script>
</body>
</html>
